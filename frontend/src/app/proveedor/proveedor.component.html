<div style="padding:30px">
  <p-table [value]="proveedor" selectionMode="single" [(selection)]="proveedor_seleccionado" (onRowSelect)="llenar_formulario_proveedor()">
    <ng-template pTemplate="caption">
      <p-button icon="pi pi-plus" (click)="ver_form_proveedor=true; form_proveedor.reset()"></p-button>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>Id</th>
        <th>Nombre</th>
        <th>Direccion</th>
        <th>Telefono</th>
        <th>Correo</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-proveedor>
      <tr [pSelectableRow]="proveedor">
        <td>{{proveedor.id}}</td>
        <td>{{proveedor.nombre}}</td>
        <td>{{proveedor.direccion}}</td>
        <td>{{proveedor.telefono}}</td>
        <td>{{proveedor.correo}}</td>

      </tr>
    </ng-template>
  </p-table>
</div>
<p-dialog header="Proveedor" [(visible)]="ver_form_proveedor" [position]="'top'" [modal]="true">
  <form [formGroup]="form_proveedor">
    <div class="login-page">
      <div class="form">
        <input pInputText formControlName="nombre" type="text" placeholder="Nombre"/>
        <br>
        <input pInputText formControlName="direccion" type="text" placeholder="Direccion"/>
        <br>
        <input pInputText formControlName="telefono" type="text" placeholder="Telefono"/>
        <br>
        <input pInputText formControlName="correo" type="text" placeholder="Correo"/>
      </div>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <p-button icon="pi pi-check"  label="Guardar" (click)="guardar()" styleClass="p-button-text"></p-button>
  </ng-template>
</p-dialog>
