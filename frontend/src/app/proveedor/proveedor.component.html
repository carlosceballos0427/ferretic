<div class="p-4">
  <div class="glass-panel p-4 mb-4 flex justify-content-between align-items-center">
    <div>
      <h2 class="m-0">Gestión de Proveedores</h2>
      <p class="text-secondary m-0">Administración de suministros y aliados</p>
    </div>
    <button pButton pRipple label="Nuevo Proveedor" icon="pi pi-plus" class="p-button-warning"
      (click)="ver_form_proveedor=true; form_proveedor.reset()"></button>
  </div>

  <div class="card glass-panel overflow-hidden">
    <p-table [value]="proveedor" selectionMode="single" [(selection)]="proveedor_seleccionado"
      (onRowSelect)="llenar_formulario_proveedor()" responsiveLayout="stack">
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
          <th pSortableColumn="proveedor">Proveedor <p-sortIcon field="proveedor"></p-sortIcon></th>
          <th>Dirección</th>
          <th>Teléfono</th>
          <th>Correo</th>
          <th>Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-prov>
        <tr [pSelectableRow]="prov">
          <td><span class="p-column-title">ID</span>{{prov.id}}</td>
          <td><span class="p-column-title">Proveedor</span><span class="font-bold">{{prov.proveedor}}</span></td>
          <td><span class="p-column-title">Dirección</span>{{prov.direccion}}</td>
          <td><span class="p-column-title">Teléfono</span>{{prov.telefono}}</td>
          <td><span class="p-column-title">Correo</span>{{prov.correo}}</td>
          <td>
            <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-text"
              (click)="proveedor_seleccionado=prov; llenar_formulario_proveedor()"></button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog header="Ficha del Proveedor" [(visible)]="ver_form_proveedor" [style]="{width: '450px'}" [modal]="true"
  class="p-fluid">
  <form [formGroup]="form_proveedor" class="mt-4">
    <div class="field mb-3">
      <label class="block mb-2">Nombre / Empresa</label>
      <input pInputText formControlName="proveedor" placeholder="Ej: Aceros S.A." />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Dirección</label>
      <input pInputText formControlName="direccion" placeholder="Zona Industrial..." />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Teléfono</label>
      <input pInputText formControlName="telefono" placeholder="601..." />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Correo</label>
      <input pInputText formControlName="correo" placeholder="ventas@empresa.com" />
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
      (click)="ver_form_proveedor=false"></button>
    <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-warning" (click)="guardar()"></button>
  </ng-template>
</p-dialog>
