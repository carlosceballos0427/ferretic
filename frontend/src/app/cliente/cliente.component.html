<div class="p-4">
  <div class="glass-panel p-4 mb-4 flex justify-content-between align-items-center">
    <div>
      <h2 class="m-0">Gestión de Clientes</h2>
      <p class="text-secondary m-0">Directorio de clientes y contactos</p>
    </div>
    <button pButton pRipple label="Nuevo Cliente" icon="pi pi-user-plus" class="p-button-help"
      (click)="ver_form_cliente=true; form_cliente.reset()"></button>
  </div>

  <div class="card glass-panel overflow-hidden">
    <p-table [value]="clientes" selectionMode="single" [(selection)]="cliente_seleccionado"
      (onRowSelect)="llenar_formulario_cliente()" responsiveLayout="stack">
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
          <th pSortableColumn="cliente">Nombre <p-sortIcon field="cliente"></p-sortIcon></th>
          <th>Dirección</th>
          <th>Teléfono</th>
          <th>Correo</th>
          <th>Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-cliente>
        <tr [pSelectableRow]="cliente">
          <td><span class="p-column-title">ID</span>{{cliente.id}}</td>
          <td><span class="p-column-title">Nombre</span><span class="font-bold">{{cliente.cliente}}</span></td>
          <td><span class="p-column-title">Dirección</span>{{cliente.direccion}}</td>
          <td><span class="p-column-title">Teléfono</span>{{cliente.telefono}}</td>
          <td><span class="p-column-title">Correo</span>{{cliente.correo}}</td>
          <td>
            <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-text"
              (click)="cliente_seleccionado=cliente; llenar_formulario_cliente()"></button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog header="Perfil del Cliente" [(visible)]="ver_form_cliente" [style]="{width: '450px'}" [modal]="true"
  class="p-fluid">
  <form [formGroup]="form_cliente" class="mt-4">
    <div class="field mb-3">
      <label class="block mb-2">Nombre / Razón Social</label>
      <input pInputText formControlName="cliente" placeholder="Ej: Juan Perez" />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Dirección</label>
      <input pInputText formControlName="direccion" placeholder="Calle..." />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Teléfono</label>
      <input pInputText formControlName="telefono" placeholder="300..." />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Correo</label>
      <input pInputText formControlName="correo" placeholder="email@ejemplo.com" />
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
      (click)="ver_form_cliente=false"></button>
    <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-help" (click)="guardar()"></button>
  </ng-template>
</p-dialog>
