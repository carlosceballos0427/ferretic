<div style="padding:30px">
  <p-table [value]="clientes" selectionMode="single" [(selection)]="cliente_seleccionado" (onRowSelect)="llenar_formulario_cliente()">
    <ng-template pTemplate="caption">
      <p-button icon="pi pi-plus" (click)="ver_form_cliente=true; form_cliente.reset()"></p-button>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>Id</th>
        <th>Nombre</th>
        <th>Direccion</th>
        <th>Telefono</th>
        <th>Correo</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-cliente>
      <tr [pSelectableRow]="cliente">
        <td>{{cliente.id}}</td>
        <td>{{cliente.nombre}}</td>
        <td>{{cliente.direccion}}</td>
        <td>{{cliente.telefono}}</td>
        <td>{{cliente.correo}}</td>

      </tr>
    </ng-template>
  </p-table>
</div>
<p-dialog header="Cliente" [(visible)]="ver_form_cliente" [position]="'top'" [modal]="true">
  <form [formGroup]="form_cliente">
    <div class="login-page">
      <div class="form">
        <input pInputText formControlName="nombre" type="text" placeholder="Nombre"/>
        <br>
        <input pInputText formControlName="direccion" type="text" placeholder="Direccion"/>
        <br>
        <input pInputText formControlName="telefono" type="text" placeholder="Telefono"/>
        <br>
        <input pInputText formControlName="correo" type="text" placeholder="Correo"/>
      </div>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <p-button icon="pi pi-check"  label="Guardar" (click)="guardar()" styleClass="p-button-text"></p-button>
  </ng-template>
</p-dialog>
