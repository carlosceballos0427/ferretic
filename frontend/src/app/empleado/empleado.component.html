<div class="p-4">
  <div class="glass-panel p-4 mb-4 flex justify-content-between align-items-center">
    <div>
      <h2 class="m-0">Gestión de Empleados</h2>
      <p class="text-secondary m-0">Administración del equipo de trabajo</p>
    </div>
    <button pButton pRipple label="Nuevo Empleado" icon="pi pi-user-plus" class="p-button-info"
      (click)="ver_form_empleado=true; form_empleado.reset()"></button>
  </div>

  <div class="card glass-panel overflow-hidden">
    <p-table [value]="empleados" selectionMode="single" [(selection)]="empleado_seleccionado"
      (onRowSelect)="llenar_formulario_empleado()" responsiveLayout="stack">
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
          <th pSortableColumn="empleado">Nombre <p-sortIcon field="empleado"></p-sortIcon></th>
          <th>Dirección</th>
          <th>Teléfono</th>
          <th>Correo</th>
          <th>Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-empleado>
        <tr [pSelectableRow]="empleado">
          <td><span class="p-column-title">ID</span>{{empleado.id}}</td>
          <td><span class="p-column-title">Nombre</span><span class="font-bold">{{empleado.empleado}}</span></td>
          <td><span class="p-column-title">Dirección</span>{{empleado.direccion}}</td>
          <td><span class="p-column-title">Teléfono</span>{{empleado.telefono}}</td>
          <td><span class="p-column-title">Correo</span>{{empleado.correo}}</td>
          <td>
            <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-text"
              (click)="empleado_seleccionado=empleado; llenar_formulario_empleado()"></button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog header="Datos del Empleado" [(visible)]="ver_form_empleado" [style]="{width: '450px'}" [modal]="true"
  class="p-fluid">
  <form [formGroup]="form_empleado" class="mt-4">
    <div class="field mb-3">
      <label class="block mb-2">Nombre Completo</label>
      <input pInputText formControlName="empleado" placeholder="Ej: Carlos Ceballos" />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Dirección</label>
      <input pInputText formControlName="direccion" placeholder="Calle, Carrera, Ciudad" />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Teléfono</label>
      <input pInputText formControlName="telefono" placeholder="300..." />
    </div>
    <div class="field mb-3">
      <label class="block mb-2">Correo Electrónico</label>
      <input pInputText formControlName="correo" placeholder="correo@ejemplo.com" />
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
      (click)="ver_form_empleado=false"></button>
    <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-info" (click)="guardar()"></button>
  </ng-template>
</p-dialog>
