<div style="padding:30px">
  <p-table [value]="almacen" selectionMode="single" [(selection)]="almacen_seleccionado" (onRowSelect)="llenar_formulario_almacen()">
    <ng-template pTemplate="caption">

    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>Id</th>
        <th>Producto</th>
        <th>Cantidad Venta</th>
        <th>Cantidad Compra</th>

      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-almacen>
      <tr [pSelectableRow]="almacen">
        <td >{{almacen.id}}</td>
        <td >{{almacen.producto.nombre}}</td>
        <td >{{almacen.venta.cantidad_venta}}</td>
        <td >{{almacen.compra.cantidad_compra}}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
<p-dialog header="Almacen" [(visible)]="ver_form_almacen" [position]="'top'" [modal]="true">
  <form [formGroup]="form_almacen">
    <div class="login-page">
      <div class="form">
        <p-dropdown appendTo="body" [options]="productos" formControlName="producto_id" optionLabel="nombre" optionValue="id"></p-dropdown>
        <br>
        <p-dropdown appendTo="body" [options]="ventas" formControlName="venta_id" optionLabel="cantidad_venta" optionValue="id"></p-dropdown>
        <br>
        <p-dropdown appendTo="body" [options]="compras" formControlName="compra_id" optionLabel="cantidad_compra" optionValue="id"></p-dropdown>
        <br>
      </div>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <p-button icon="pi pi-check"  label="Guardar" (click)="guardar()" styleClass="p-button-text"></p-button>
  </ng-template>
</p-dialog>
